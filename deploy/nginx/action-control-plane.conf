# Example NGINX reverse-proxy configuration for one managed single-tenant pilot.
# Replace the hostname and certificate paths before use.

upstream action_control_plane_upstream {
    server 127.0.0.1:8000;
    keepalive 16;
}

log_format action_control_plane_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"host":"$host",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"user_agent":"$http_user_agent"'
    '}';

server {
    listen 80;
    listen [::]:80;
    server_name pilot.action-control-plane.example;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pilot.action-control-plane.example;

    ssl_certificate /etc/nginx/tls/action-control-plane.crt;
    ssl_certificate_key /etc/nginx/tls/action-control-plane.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ActionControlPlaneTLS:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /dev/stdout action_control_plane_json;
    error_log /dev/stderr warn;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location / {
        proxy_pass http://action_control_plane_upstream;
    }
}
