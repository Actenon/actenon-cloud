name: Protocol drift gate

# This workflow fails when the pinned actenon-protocol package and this
# repository disagree on:
#   - refusal-code taxonomy (canonical codes + compatibility aliases)
#   - canonicalisation byte output for shared test vectors
#   - protocol version pin
#   - boundary preservation (cloud must not become proof-validity definition)
#
# See tests/test_protocol_drift.py for the full gate.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run protocol drift gate
        run: python -m pytest tests/test_protocol_drift.py -v --tb=short

      - name: Verify protocol version pin in pyproject.toml
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          deps = data['project']['dependencies']
          assert any('actenon-protocol' in d and 'v1.1.0' in d for d in deps), (
              f'actenon-protocol @ v1.1.0 not pinned in dependencies: {deps}'
          )
          print('OK: actenon-protocol @ v1.1.0 pinned')
          "

      - name: Verify contract tests do not pin to raw refusal_code strings
        run: |
          python -c "
          import re
          from pathlib import Path
          contract_dir = Path('tests/contract')
          if not contract_dir.exists():
              print('OK: no contract tests directory')
              exit(0)
          forbidden = re.compile(
              r'assert\s+exc_info\.value\.refusal_code\s*==\s*[\"\']'
              r'(SIGNATURE_INVALID|PROOF_INVALID|AUDIENCE_MISMATCH|TARGET_MISMATCH|'
              r'ACTION_MISMATCH|PARAMETER_MISMATCH|ISSUER_UNTRUSTED)[\"\']'
          )
          violations = []
          for py_file in contract_dir.rglob('*.py'):
              text = py_file.read_text()
              for match in forbidden.finditer(text):
                  line_no = text[:match.start()].count('\n') + 1
                  violations.append(f'{py_file.name}:{line_no}: {match.group(0).strip()}')
          if violations:
              raise SystemExit(
                  'contract tests assert on raw refusal_code strings (disclosure-'
                  'policy-dependent). Use refusal_code_to_failure_code() instead. '
                  f'Violations:\n  ' + '\n  '.join(violations)
              )
          print('OK: contract tests use canonical FailureCode')
          "
